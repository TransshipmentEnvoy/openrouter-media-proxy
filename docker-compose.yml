version: "3.8"

services:
  openrouter-media-proxy:
    image: python:3.14-slim
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${PROXY_PORT:-8080}:8080"
    environment:
      - OPENROUTER_URL=https://openrouter.ai/api/v1
      # You can use "image,text" for Gemini-style models; default works for all image models.
      - DEFAULT_IMAGE_MODALITIES=image
      - UPSTREAM_TIMEOUT=120
      - LOG_LEVEL=INFO
    command: >
      bash -c 'pip install --no-cache-dir -r requirements.txt &&
      uvicorn openrouter_media_proxy:app --host 0.0.0.0 --port 8080'
    volumes:
      - ./openrouter_media_proxy.py:/app/openrouter_media_proxy.py:ro
      - ./requirements.txt:/app/requirements.txt:ro
    networks:
      - my_network

  # ── Example: Open WebUI in the same network ──────────────────────────
  # open-webui:
  #   image: ghcr.io/open-webui/open-webui:main
  #   networks:
  #     - my_network

networks:
  my_network:
